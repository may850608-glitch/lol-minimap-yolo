# 專案共用設定

# Data Dragon 版本(英雄頭像來源)。
ddragon_version: "16.13.1"

# 這場要分析的比賽影片中,小地圖在 1920x1080 畫面的位置(像素)。
# 由 02_grab_frame.py 抽幀 + 格線定位得出。(EWC 2026 轉播版面)
minimap:
  x0: 1670
  y0: 831
  x1: 1908
  y1: 1069

# 訓練/推論時把小地圖統一縮放到這個邊長(正方形)。
train_imgsz: 256

# === 這場比賽:EWC 2026 八強 Game 1, DK vs BLG (2026-07-17, patch 16.13) ===
# 前 5 = 藍方(合成資料畫藍環),後 5 = 紅方(紅環)。DK 為藍方(記分板左側)。
# 用 Data Dragon 的英雄 ID(注意大小寫)。class 順序即 YOLO class id。
champions:
  # DK(藍方)
  - KSante      # Siwoo (top)
  - LeeSin      # Lucid (jungle)
  - Cassiopeia  # ShowMaker (mid)
  - Kaisa       # Smash (adc)
  - Nautilus    # Career (support)  <- 追蹤目標
  # BLG(紅方)
  - Jayce       # Bin   (top)
  - JarvanIV    # XUN   (jungle)
  - Viktor      # Knight(mid)
  - Ziggs       # Viper (adc)
  - Camille     # ON    (support)

# 隊伍標籤:teams[0] = 前 5 隻(藍方),teams[1] = 後 5 隻(紅方)
teams: ["DK", "BLG"]

# 各隊 ADC / 輔助(用上面的英雄 ID)與輔助選手名(顯示用)
adc_champ:     { DK: Kaisa,    BLG: Ziggs }
support_champ: { DK: Nautilus, BLG: Camille }
support_player: { DK: Career,  BLG: "ON" }  # ON 需加引號,否則 YAML 會解析成布林值

# 分析追蹤目標(09/10 預設分析對象)
focus_champion: Nautilus
